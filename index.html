<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="おそうじタイマー">
<meta name="theme-color" content="#fffbeb">
<title>🐥 おそうじタイマー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --yellow:     #FBBF24;
    --yellow-dk:  #F59E0B;
    --yellow-dkr: #D97706;
    --yellow-lt:  #FEF3C7;
    --yellow-bg:  #FFFBEB;
    --orange:     #FB923C;
    --card:       #ffffff;
    --text:       #78350F;
    --muted:      #D97706;
    --muted-lt:   #FDE68A;
    --c0:#FEF3C7; --c1:#FDE68A; --c2:#FCD34D; --c3:#FBBF24; --c4:#F59E0B;
  }
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }

  html, body {
    min-height:100%;
    background:var(--yellow-bg);
    font-family:'Nunito',-apple-system,sans-serif;
    color:var(--text); user-select:none;
    overflow-x:hidden; overflow-y:auto;
  }
  body {
    display:flex; flex-direction:column; align-items:center;
    padding:10px 10px 28px; gap:10px;
  }
  body::before {
    content:''; position:fixed; inset:0;
    background-image:
      radial-gradient(circle at 20% 20%, rgba(251,191,36,.12) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(245,158,11,.10) 0%, transparent 50%);
    pointer-events:none; z-index:0;
  }

  #wrap {
    position:relative; z-index:1;
    display:flex; flex-direction:column; align-items:center; gap:10px;
    width:100%; max-width:360px;
  }

  @keyframes blink    { 0%,100%{opacity:1} 50%{opacity:.25} }
  @keyframes fadein   { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  @keyframes logslide { from{opacity:0;transform:translateY(-5px)} to{opacity:1;transform:translateY(0)} }
  @keyframes popCell  { 0%{transform:scale(1)} 45%{transform:scale(1.8)} 100%{transform:scale(1)} }
  @keyframes waddle   { 0%,100%{transform:rotate(-7deg)} 50%{transform:rotate(7deg)} }
  @keyframes bounce   { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
  @keyframes bubbleup { 0%{opacity:.7;transform:translateY(0)} 100%{opacity:0;transform:translateY(-36px)} }

  /* duck header */
  #duck-header { text-align:center; animation:fadein .4s ease both; }
  #duck-emoji {
    font-size:46px; line-height:1; display:inline-block;
    filter:drop-shadow(0 3px 6px rgba(245,158,11,.3));
  }
  #duck-emoji.running { animation:waddle .5s ease-in-out infinite; }
  #duck-emoji.done    { animation:bounce .5s ease-in-out infinite; }
  #app-subtitle {
    font-size:9px; font-weight:900; letter-spacing:.25em; text-transform:uppercase;
    color:var(--muted); margin-top:3px;
  }

  /* install banner */
  #install-bar {
    display:none; width:100%;
    background:#fffbeb; border:2px solid var(--yellow);
    border-radius:14px; padding:8px 12px;
    align-items:center; justify-content:space-between; gap:6px;
  }
  #install-bar.show { display:flex; }
  #install-bar span { font-size:10px; color:var(--yellow-dkr); font-weight:700; }
  #btn-install {
    border:none; cursor:pointer; background:var(--yellow); color:var(--text);
    font-size:10px; font-weight:800; padding:5px 12px; border-radius:8px;
    white-space:nowrap; font-family:'Nunito',sans-serif;
  }
  #btn-install-close { border:none; background:none; cursor:pointer; font-size:16px; color:var(--muted); }

  /* card */
  .card {
    background:var(--card); border-radius:22px;
    box-shadow: 0 3px 0 0 var(--muted-lt), 0 6px 24px rgba(251,191,36,.15), 0 0 0 1.5px var(--muted-lt);
    width:100%; animation:fadein .5s ease both;
  }

  /* timer card */
  #timer-card { padding:18px 16px 16px; display:flex; flex-direction:column; align-items:center; }

  #phase-label {
    font-size:10px; font-weight:800; letter-spacing:.2em; text-transform:uppercase;
    color:var(--yellow-dkr); margin-bottom:14px;
    display:flex; align-items:center; gap:6px;
    background:var(--yellow-lt); padding:4px 12px; border-radius:16px;
    transition:color .4s;
  }
  #phase-dot {
    width:6px; height:6px; border-radius:50%;
    background:var(--yellow-dkr); flex-shrink:0; transition:background .4s;
  }
  #phase-dot.running { animation:blink 1s ease-in-out infinite; }

  /* donut */
  #ring-wrap { position:relative; width:175px; height:175px; margin-bottom:14px; }
  #ring-svg { position:absolute; top:0; left:0; transform:rotate(-90deg); }
  #track { fill:none; stroke:var(--muted-lt); stroke-width:16; }
  #arc   { fill:none; stroke:var(--yellow); stroke-width:16; stroke-linecap:round;
           transition:stroke-dasharray .7s linear,stroke .4s;
           filter:drop-shadow(0 0 5px rgba(251,191,36,.5)); }
  #ring-inner {
    position:absolute; inset:16px; border-radius:50%;
    background:linear-gradient(135deg,#fffde7,#fffbeb); transition:box-shadow .4s;
  }
  #center {
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px;
  }
  #time-display {
    font-family:'Orbitron',monospace;
    font-size:36px; font-weight:900; letter-spacing:.02em;
    color:var(--text); line-height:1; transition:color .4s,font-size .3s;
    text-shadow:0 2px 6px rgba(245,158,11,.2);
  }
  #set-display { font-size:10px; color:var(--muted); letter-spacing:.1em; font-family:monospace; font-weight:700; }

  /* task chips — 横スクロール */
  #task-scroll { width:100%; overflow-x:auto; scrollbar-width:none; margin-bottom:12px; }
  #task-scroll::-webkit-scrollbar { display:none; }
  #task-row { display:flex; gap:5px; padding:2px 2px; width:max-content; }
  .task-chip {
    font-size:10px; font-weight:700; padding:4px 10px; border-radius:16px;
    background:var(--yellow-lt); color:var(--yellow-dkr);
    border:1.5px solid transparent; cursor:pointer; transition:all .2s; white-space:nowrap;
  }
  .task-chip:active { transform:scale(.95); }
  .task-chip.active {
    background:var(--yellow); color:var(--text);
    border-color:var(--yellow-dk); box-shadow:0 2px 6px rgba(251,191,36,.4);
  }

  /* indicators */
  #indicators { display:flex; gap:7px; margin-bottom:14px; }
  .dot { height:7px; border-radius:4px; background:var(--yellow-lt); transition:all .3s ease; }

  /* controls — 3ボタン均等 */
  #controls { display:flex; gap:6px; align-items:center; width:100%; }
  .pomo-btn {
    border:none; cursor:pointer;
    font-family:'Nunito',sans-serif; font-weight:800;
    border-radius:11px; font-size:10px;
    background:var(--yellow-lt); color:var(--yellow-dkr);
    height:38px; display:flex; align-items:center; justify-content:center;
    transition:all .15s; text-transform:uppercase;
    border:1.5px solid var(--muted-lt);
    flex:1; /* ← 均等に広がる */
    min-width:0; /* ← はみ出し防止 */
  }
  .pomo-btn:active { transform:scale(.95); background:var(--muted-lt); }
  #btn-start {
    border-radius:13px; font-size:13px; font-weight:900;
    background:var(--yellow); color:var(--text);
    box-shadow:0 3px 0 var(--yellow-dkr),0 5px 14px rgba(251,191,36,.4);
    height:44px; border:none; flex:1.6; /* スタートだけ少し広く */
    transition:all .15s;
  }
  #btn-start:active { transform:translateY(2px); box-shadow:0 1px 0 var(--yellow-dkr); }
  #btn-start:disabled { background:var(--muted-lt); color:#b45309; box-shadow:0 3px 0 #fde68a; cursor:default; }

  #hint { margin-top:10px; font-size:9px; color:var(--muted); letter-spacing:.12em; text-transform:uppercase; min-height:11px; text-align:center; font-weight:700; }
  #cheer { font-size:12px; font-weight:800; color:var(--yellow-dkr); margin-top:6px; min-height:16px; text-align:center; }

  .sparkle { position:fixed; pointer-events:none; font-size:18px; z-index:999; animation:bubbleup 1.1s ease-out forwards; }

  /* graph */
  #graph-card { padding:16px 16px 14px; animation-delay:.1s; }
  #graph-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
  #graph-title { font-size:10px; font-weight:900; letter-spacing:.28em; text-transform:uppercase; color:var(--muted); }
  #graph-stats { font-size:10px; font-weight:800; color:var(--yellow-dkr); }
  #month-labels { display:flex; margin-bottom:3px; padding-left:22px; font-size:8px; color:var(--muted); overflow:hidden; }
  .month-label { flex-shrink:0; }
  #graph-body { display:flex; gap:3px; }
  #weekday-labels { display:flex; flex-direction:column; gap:2px; padding-top:1px; font-size:8px; color:var(--muted); }
  .wday { height:10px; line-height:10px; width:14px; text-align:right; padding-right:3px; font-weight:700; }
  #graph-grid { display:flex; gap:2px; overflow-x:auto; scrollbar-width:none; padding-bottom:2px; }
  #graph-grid::-webkit-scrollbar { display:none; }
  .week-col { display:flex; flex-direction:column; gap:2px; }
  .cell { width:10px; height:10px; border-radius:2px; background:var(--c0); cursor:default; transition:transform .15s; flex-shrink:0; }
  .cell:active { transform:scale(1.4); }
  .cell.c1{background:var(--c1)} .cell.c2{background:var(--c2)} .cell.c3{background:var(--c3)} .cell.c4{background:var(--c4)}
  .cell.pop { animation:popCell .4s ease; }
  .cell.future { opacity:.3; }
  #legend { display:flex; align-items:center; gap:4px; margin-top:8px; justify-content:flex-end; font-size:8px; color:var(--muted); font-weight:700; }
  .leg { width:9px; height:9px; border-radius:2px; }

  #tooltip {
    position:fixed; pointer-events:none;
    background:#78350F; color:#fff; font-family:'Nunito',sans-serif; font-weight:700;
    font-size:10px; border-radius:8px; padding:4px 10px; white-space:nowrap;
    opacity:0; transition:opacity .15s; z-index:100;
  }
  #tooltip.show { opacity:1; }

  /* log */
  #log-card { padding:14px 16px; animation-delay:.2s; }
  #log-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
  #log-title { font-size:10px; font-weight:900; letter-spacing:.28em; text-transform:uppercase; color:var(--muted); }
  #btn-clear-log { border:none; background:none; cursor:pointer; font-family:'Nunito',sans-serif; font-size:9px; color:#D97706; padding:3px 8px; border-radius:6px; text-transform:uppercase; height:26px; font-weight:700; }
  #btn-clear-log:active { background:var(--yellow-lt); }
  #log-list { display:flex; flex-direction:column; gap:5px; max-height:140px; overflow-y:auto; scrollbar-width:thin; scrollbar-color:var(--muted-lt) transparent; }
  #log-list::-webkit-scrollbar { width:3px; }
  #log-list::-webkit-scrollbar-thumb { background:var(--muted-lt); border-radius:3px; }
  .log-item { display:flex; align-items:center; justify-content:space-between; padding:7px 10px; background:var(--yellow-lt); border-radius:10px; border:1.5px solid var(--muted-lt); animation:logslide .3s ease; }
  .log-left { display:flex; align-items:center; gap:6px; }
  .log-icon { font-size:13px; }
  .log-date { font-size:11px; color:#92400E; font-family:monospace; font-weight:700; }
  .log-time-s { font-size:9px; color:var(--muted); }
  .log-task-name { font-size:9px; color:var(--muted); font-weight:700; }
  .log-badge { display:inline-flex; align-items:center; gap:3px; background:var(--yellow); border-radius:7px; padding:2px 9px; font-size:10px; font-weight:900; color:var(--text); }
  #log-empty { font-size:10px; color:var(--muted); text-align:center; padding:10px 0; font-weight:700; }
</style>
</head>
<body>
<div id="tooltip"></div>
<div id="wrap">

  <div id="install-bar">
    <span>📲 ホーム画面に追加でオフライン使用可能</span>
    <button id="btn-install">追加</button>
    <button id="btn-install-close">×</button>
  </div>

  <div id="duck-header">
    <div id="duck-emoji">🐥</div>
    <div id="app-subtitle">おそうじタイマー</div>
  </div>

  <div class="card" id="timer-card">
    <div id="phase-label">
      <span id="phase-dot"></span>
      <span id="phase-text">おそうじ中！</span>
    </div>
    <div id="ring-wrap">
      <div id="ring-inner"></div>
      <svg id="ring-svg" width="175" height="175">
        <circle id="track" cx="87.5" cy="87.5" r="73"/>
        <circle id="arc"   cx="87.5" cy="87.5" r="73"/>
      </svg>
      <div id="center">
        <div id="time-display">25:00</div>
        <div id="set-display">SET 1 / 4</div>
      </div>
    </div>

    <!-- 横スクロールのタスクチップ -->
    <div id="task-scroll">
      <div id="task-row">
        <div class="task-chip active" data-task="🧹 掃除機">🧹 掃除機</div>
        <div class="task-chip" data-task="🫧 お風呂">🫧 お風呂</div>
        <div class="task-chip" data-task="🍽️ 食器">🍽️ 食器</div>
        <div class="task-chip" data-task="🧺 洗濯">🧺 洗濯</div>
        <div class="task-chip" data-task="✨ その他">✨ その他</div>
      </div>
    </div>

    <div id="indicators">
      <div class="dot" id="dot-0"></div>
      <div class="dot" id="dot-1"></div>
      <div class="dot" id="dot-2"></div>
      <div class="dot" id="dot-3"></div>
    </div>

    <div id="controls">
      <button class="pomo-btn" id="btn-reset">リセット</button>
      <button class="pomo-btn" id="btn-start">スタート</button>
      <button class="pomo-btn" id="btn-skip">スキップ</button>
    </div>

    <div id="hint">おそうじ → 休憩 → くりかえし</div>
    <div id="cheer">いってみよう！🐥</div>
  </div>

  <div class="card" id="graph-card">
    <div id="graph-header">
      <div id="graph-title">🌟 Activity</div>
      <div id="graph-stats"></div>
    </div>
    <div id="month-labels"></div>
    <div id="graph-body">
      <div id="weekday-labels">
        <div class="wday"></div>
        <div class="wday">Mon</div>
        <div class="wday"></div>
        <div class="wday">Wed</div>
        <div class="wday"></div>
        <div class="wday">Fri</div>
        <div class="wday"></div>
      </div>
      <div id="graph-grid"></div>
    </div>
    <div id="legend">
      <span>Less</span>
      <div class="leg" style="background:var(--c0)"></div>
      <div class="leg" style="background:var(--c1)"></div>
      <div class="leg" style="background:var(--c2)"></div>
      <div class="leg" style="background:var(--c3)"></div>
      <div class="leg" style="background:var(--c4)"></div>
      <span>More</span>
    </div>
  </div>

  <div class="card" id="log-card">
    <div id="log-header">
      <div id="log-title">🐥 きろく</div>
      <button id="btn-clear-log">クリア</button>
    </div>
    <div id="log-list">
      <div id="log-empty">まだ記録がありません 🐣</div>
    </div>
  </div>
</div>

<script>
(function(){
  /* PWA */
  if('serviceWorker' in navigator){
    var swCode=[
      'var CACHE="clean-pomo-v3";',
      'self.addEventListener("install",function(e){e.waitUntil(caches.open(CACHE).then(function(c){return c.addAll([self.location.href]);}));self.skipWaiting();});',
      'self.addEventListener("activate",function(e){e.waitUntil(caches.keys().then(function(keys){return Promise.all(keys.filter(function(k){return k!==CACHE;}).map(function(k){return caches.delete(k);}));}).then(function(){return clients.claim();}));});',
      'self.addEventListener("fetch",function(e){e.respondWith(caches.match(e.request).then(function(r){return r||fetch(e.request);}));});'
    ].join('\n');
    try{var blob=new Blob([swCode],{type:'application/javascript'});navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(function(){});}catch(e){}
  }
  var deferredPrompt=null, installBar=document.getElementById('install-bar');
  window.addEventListener('beforeinstallprompt',function(e){e.preventDefault();deferredPrompt=e;installBar.classList.add('show');});
  document.getElementById('btn-install').addEventListener('click',function(){if(deferredPrompt){deferredPrompt.prompt();deferredPrompt=null;}installBar.classList.remove('show');});
  document.getElementById('btn-install-close').addEventListener('click',function(){installBar.classList.remove('show');});

  var WORK=25*60,BREAK=5*60,MAX_SETS=4;
  var R=73,CIRC=2*Math.PI*R;
  var LOG_KEY="clean_pomo_log_v1",STATE_KEY="clean_pomo_state_v3";
  var MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"],WEEKS=53;
  var CHEER_WORK=["ピカピカにしよう！✨","がんばれ〜！💪","スッキリさせよう！🧹","あともう少し！🌟","きれいになってきた！🫧","ファイト！🐥","終わったら気持ちいい！🌈"];
  var CHEER_BREAK=["よくやった！休憩中〜☕","ひと息つこう！🍵","えらい！🎉","上手！🐥","すごいじゃん！💛","ゆっくり休んでね〜🌸"];
  var CHEER_DONE=["🎊 全部おわった！最高！","🐥🐥🐥 ピヨピヨ！","✨ ピッカピカ！やったね！","🌟 おそうじマスター！","🎉 お疲れ様！すごい！"];

  var phase,timeLeft,isRunning,currentSet,completedSets,done;
  var startedAt=null,_timeLeftBase=WORK,tmr=null,selectedTask="🧹 掃除機";

  var arcEl=document.getElementById("arc"),ringInner=document.getElementById("ring-inner");
  var timeEl=document.getElementById("time-display"),setEl=document.getElementById("set-display");
  var phaseText=document.getElementById("phase-text"),phaseDot=document.getElementById("phase-dot");
  var hintEl=document.getElementById("hint"),cheerEl=document.getElementById("cheer");
  var btnStart=document.getElementById("btn-start"),btnSkip=document.getElementById("btn-skip"),btnReset=document.getElementById("btn-reset");
  var duckEl=document.getElementById("duck-emoji"),tooltip=document.getElementById("tooltip");

  function fmt(s){s=Math.max(0,Math.round(s));return("0"+Math.floor(s/60)).slice(-2)+":"+("0"+(s%60)).slice(-2);}
  function toKey(d){return d.getFullYear()+"/"+ ("0"+(d.getMonth()+1)).slice(-2)+"/"+ ("0"+d.getDate()).slice(-2);}
  function rnd(arr){return arr[Math.floor(Math.random()*arr.length)];}

  function spawnSparkles(){
    var emojis=["✨","🌟","⭐","💛","🐥","🫧","🎉"];
    for(var i=0;i<8;i++){(function(i){setTimeout(function(){
      var el=document.createElement("div");el.className="sparkle";
      el.textContent=emojis[Math.floor(Math.random()*emojis.length)];
      el.style.left=Math.random()*80+10+"%";el.style.top=Math.random()*60+15+"%";
      document.body.appendChild(el);setTimeout(function(){el.parentNode&&el.parentNode.removeChild(el);},1300);
    },i*100);})(i);}
  }

  document.querySelectorAll(".task-chip").forEach(function(chip){
    chip.addEventListener("click",function(){
      document.querySelectorAll(".task-chip").forEach(function(c){c.classList.remove("active");});
      chip.classList.add("active");selectedTask=chip.getAttribute("data-task");
    });
  });

  function saveState(){try{localStorage.setItem(STATE_KEY,JSON.stringify({phase:phase,timeLeft:timeLeft,isRunning:isRunning,currentSet:currentSet,completedSets:completedSets,done:done,startedAt:startedAt,timeLeftBase:_timeLeftBase,selectedTask:selectedTask}));}catch(e){}}
  function loadState(){
    try{
      var s=JSON.parse(localStorage.getItem(STATE_KEY));if(!s)return false;
      phase=s.phase||"work";isRunning=s.isRunning||false;currentSet=s.currentSet||1;completedSets=s.completedSets||0;
      done=s.done||false;startedAt=s.startedAt||null;_timeLeftBase=s.timeLeftBase||WORK;
      if(s.selectedTask)selectedTask=s.selectedTask;
      if(isRunning&&startedAt){var e=Math.floor((Date.now()-startedAt)/1000);timeLeft=(_timeLeftBase||s.timeLeft||WORK)-e;if(timeLeft<=0){timeLeft=0;isRunning=false;return"expired";}}
      else{timeLeft=s.timeLeft!=null?s.timeLeft:WORK;}
      return true;
    }catch(e){return false;}
  }
  function resetState(){phase="work";timeLeft=WORK;isRunning=false;currentSet=1;completedSets=0;done=false;startedAt=null;_timeLeftBase=WORK;}

  function loadLog(){try{return JSON.parse(localStorage.getItem(LOG_KEY))||[];}catch(e){return[];}}
  function saveLog(l){try{localStorage.setItem(LOG_KEY,JSON.stringify(l));}catch(e){}}
  function addLogEntry(sets){
    var now=new Date();var log=loadLog();
    log.unshift({date:toKey(now),time:("0"+now.getHours()).slice(-2)+":"+("0"+now.getMinutes()).slice(-2),sets:sets,task:selectedTask});
    saveLog(log);renderLog();renderGraph(true);
  }
  function renderLog(){
    var log=loadLog(),list=document.getElementById("log-list"),empty=document.getElementById("log-empty");
    var items=list.querySelectorAll(".log-item");for(var i=0;i<items.length;i++)items[i].parentNode.removeChild(items[i]);
    if(!log.length){empty.style.display="";return;}empty.style.display="none";
    log.forEach(function(e){
      var item=document.createElement("div");item.className="log-item";
      item.innerHTML='<div class="log-left"><span class="log-icon">'+(e.task?e.task.split(" ")[0]:"✨")+'</span>'
        +'<div><div class="log-date">'+e.date+' <span class="log-time-s">'+e.time+'</span></div>'
        +(e.task?'<div class="log-task-name">'+e.task+'</div>':'')+'</div></div>'
        +'<span class="log-badge">'+e.sets+' set'+(e.sets>1?"s":"")+'</span>';
      list.appendChild(item);
    });
  }
  document.getElementById("btn-clear-log").addEventListener("click",function(){
    if(confirm("記録をすべて削除しますか？🐥")){try{localStorage.removeItem(LOG_KEY);}catch(e){}renderLog();renderGraph(false);}
  });

  function buildDateMap(){var log=loadLog(),map={};log.forEach(function(e){map[e.date]=(map[e.date]||0)+e.sets;});return map;}
  function cellClass(n){if(!n)return"";if(n===1)return"c1";if(n===2)return"c2";if(n===3)return"c3";return"c4";}
  function renderGraph(animate){
    var grid=document.getElementById("graph-grid"),monthLabels=document.getElementById("month-labels"),statsEl=document.getElementById("graph-stats");
    grid.innerHTML="";monthLabels.innerHTML="";
    var map=buildDateMap(),today=new Date();today.setHours(0,0,0,0);var todayKey=toKey(today);
    var start=new Date(today);start.setDate(start.getDate()-(WEEKS*7-1)-start.getDay());
    var totalSets=0,activeDays=0;
    Object.keys(map).forEach(function(k){var d=new Date(k.replace(/\//g,"-"));var diff=(today-d)/86400000;if(diff>=0&&diff<365){totalSets+=map[k];activeDays++;}});
    statsEl.textContent="🌟"+totalSets+" · "+activeDays+"days";
    var monthLabelData=[],prevMonth=-1,unitW=12;
    for(var w=0;w<WEEKS;w++){
      var col=document.createElement("div");col.className="week-col";
      for(var d2=0;d2<7;d2++){
        var date=new Date(start);date.setDate(start.getDate()+w*7+d2);
        var key=toKey(date),sets=map[key]||0;
        var cell=document.createElement("div");cell.className="cell";
        var cls=cellClass(sets);if(cls)cell.classList.add(cls);
        if(date>today)cell.classList.add("future");
        if(animate&&key===todayKey&&cls)cell.classList.add("pop");
        (function(k,s){
          cell.addEventListener("touchstart",function(){tooltip.textContent=k+" "+(s>0?"🌟"+s+"sets":"なし");tooltip.classList.add("show");tooltip.style.left="50%";tooltip.style.top="20%";});
          cell.addEventListener("touchend",function(){setTimeout(function(){tooltip.classList.remove("show");},1200);});
        })(key,sets);
        col.appendChild(cell);
        if(d2===0){var m=date.getMonth();if(m!==prevMonth){monthLabelData.push({col:w,label:MONTHS[m]});prevMonth=m;}}
      }
      grid.appendChild(col);
    }
    monthLabelData.forEach(function(ml,i){
      var span=document.createElement("span");span.className="month-label";
      var nextCol=i<monthLabelData.length-1?monthLabelData[i+1].col:WEEKS;
      span.style.width=((nextCol-ml.col)*unitW||36)+"px";
      span.textContent=(i>0&&ml.col-monthLabelData[i-1].col<3)?"":ml.label;
      monthLabels.appendChild(span);
    });
    grid.scrollLeft=grid.scrollWidth;
  }

  function render(){
    var total=(phase==="work")?WORK:BREAK,progress=timeLeft/total;
    arcEl.style.strokeDasharray=(CIRC*(1-progress))+" "+(CIRC*progress+1);
    arcEl.style.strokeDashoffset=CIRC;
    var isWork=(phase==="work"),color=isWork?"#FBBF24":"#FB923C",glow=isWork?"rgba(251,191,36,.35)":"rgba(251,146,60,.35)";
    arcEl.style.stroke=color;arcEl.style.filter="drop-shadow(0 0 6px "+glow+")";
    phaseDot.style.background=isWork?"#D97706":"#EA580C";
    isRunning?phaseDot.classList.add("running"):phaseDot.classList.remove("running");
    ringInner.style.boxShadow=isRunning?"inset 0 0 32px "+glow:"none";
    duckEl.classList.remove("running","done");
    if(done)duckEl.classList.add("done");else if(isRunning)duckEl.classList.add("running");

    if(done){
      phaseText.textContent="おそうじ完了！";timeEl.textContent="✨";timeEl.style.fontSize="44px";timeEl.style.color="#F59E0B";
      setEl.style.display="none";hintEl.textContent="";cheerEl.textContent=rnd(CHEER_DONE);
      btnStart.textContent="完了！";btnStart.disabled=true;btnSkip.disabled=true;
    }else if(isWork){
      phaseText.textContent=isRunning?"おそうじ中！":"おそうじ";
      timeEl.textContent=fmt(timeLeft);timeEl.style.fontSize="36px";timeEl.style.color="#78350F";
      setEl.style.display="";setEl.textContent="SET "+currentSet+" / "+MAX_SETS;
      btnStart.textContent=isRunning?"一時停止":"スタート";btnStart.disabled=false;btnSkip.disabled=false;
      btnStart.style.background=isRunning?"#F59E0B":"#FBBF24";
      hintEl.textContent="おそうじ → 休憩 → くりかえし";
      if(!isRunning&&timeLeft===WORK)cheerEl.textContent=rnd(CHEER_WORK);
    }else{
      phaseText.textContent="休憩中〜 ☕";
      timeEl.textContent=fmt(timeLeft);timeEl.style.fontSize="36px";timeEl.style.color="#78350F";
      setEl.style.display="";setEl.textContent="SET "+currentSet+" / "+MAX_SETS;
      btnStart.textContent=isRunning?"一時停止":"スタート";btnStart.disabled=false;btnSkip.disabled=false;
      btnStart.style.background="#FB923C";hintEl.textContent="次のセット: SET "+(currentSet+1);
      if(!isRunning)cheerEl.textContent=rnd(CHEER_BREAK);
    }
    for(var i=0;i<MAX_SETS;i++){
      var dot=document.getElementById("dot-"+i),isCur=(i===currentSet-1)&&!done;
      dot.style.width=isCur?"22px":"7px";
      dot.style.background=(i<completedSets)?"#FBBF24":isCur?color:"#FEF3C7";
      dot.style.boxShadow=isCur?"0 0 6px "+glow:"none";
    }
    saveState();
  }

  function advance(){
    clearInterval(tmr);isRunning=false;startedAt=null;
    if(phase==="work"){if(currentSet>=MAX_SETS){done=true;spawnSparkles();addLogEntry(completedSets+1);render();return;}phase="break";timeLeft=BREAK;}
    else{completedSets++;currentSet++;phase="work";timeLeft=WORK;}
    cheerEl.textContent=phase==="work"?rnd(CHEER_WORK):rnd(CHEER_BREAK);render();
  }

  function startTick(){
    clearInterval(tmr);
    tmr=setInterval(function(){
      if(!startedAt)return;
      var tl=_timeLeftBase-Math.floor((Date.now()-startedAt)/1000);
      if(tl<=0){clearInterval(tmr);timeLeft=0;render();advance();return;}
      timeLeft=tl;render();
    },500);
  }

  btnStart.addEventListener("click",function(){
    if(done)return;isRunning=!isRunning;
    if(isRunning){startedAt=Date.now();_timeLeftBase=timeLeft;startTick();cheerEl.textContent=phase==="work"?rnd(CHEER_WORK):rnd(CHEER_BREAK);}
    else{clearInterval(tmr);timeLeft=Math.max(0,_timeLeftBase-Math.floor((Date.now()-startedAt)/1000));startedAt=null;}
    render();
  });
  btnReset.addEventListener("click",function(){
    if(completedSets>0&&!done)addLogEntry(completedSets);
    clearInterval(tmr);resetState();cheerEl.textContent="いってみよう！🐥";render();
  });
  btnSkip.addEventListener("click",function(){if(done)return;clearInterval(tmr);startedAt=null;isRunning=false;advance();});

  document.addEventListener("visibilitychange",function(){
    if(document.visibilityState==="visible"&&isRunning&&startedAt){
      var tl=Math.max(0,_timeLeftBase-Math.floor((Date.now()-startedAt)/1000));
      if(tl<=0){clearInterval(tmr);timeLeft=0;render();advance();return;}
      timeLeft=tl;startTick();render();
    }
  });
  window.addEventListener("focus",function(){
    if(isRunning&&startedAt){
      var tl=Math.max(0,_timeLeftBase-Math.floor((Date.now()-startedAt)/1000));
      if(tl<=0){clearInterval(tmr);timeLeft=0;render();advance();return;}
      timeLeft=tl;startTick();render();
    }
  });

  arcEl.style.strokeDasharray="0 "+(CIRC+1);arcEl.style.strokeDashoffset=CIRC;
  var loaded=loadState();if(!loaded)resetState();
  document.querySelectorAll(".task-chip").forEach(function(chip){chip.classList.remove("active");if(chip.getAttribute("data-task")===selectedTask)chip.classList.add("active");});
  if(isRunning&&startedAt){_timeLeftBase=timeLeft;startedAt=Date.now();startTick();}
  if(loaded==="expired")advance();else render();
  renderLog();renderGraph(false);
})();
</script>
</body>
</html>
