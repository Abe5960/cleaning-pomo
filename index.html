<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="おそうじタイマー">
<meta name="theme-color" content="#fffbeb">
<title>🐥 おそうじタイマー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --yellow:     #FBBF24;
    --yellow-dk:  #F59E0B;
    --yellow-dkr: #D97706;
    --yellow-lt:  #FEF3C7;
    --yellow-bg:  #FFFBEB;
    --orange:     #FB923C;
    --card:       #ffffff;
    --text:       #78350F;
    --text-lt:    #92400E;
    --muted:      #D97706;
    --muted-lt:   #FDE68A;
    --pill:       #FEF3C7;
    --c0: #FEF3C7;
    --c1: #FDE68A;
    --c2: #FCD34D;
    --c3: #FBBF24;
    --c4: #F59E0B;
  }
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }

  body {
    min-height:100vh;
    background: var(--yellow-bg);
    font-family:'Nunito',-apple-system,sans-serif;
    color:var(--text); user-select:none;
    overflow-x:hidden; overflow-y:auto;
    padding:24px 16px 40px;
    display:flex; flex-direction:column; align-items:center; gap:16px;
  }
  body::before {
    content:'';
    position:fixed; inset:0;
    background-image:
      radial-gradient(circle at 20% 20%, rgba(251,191,36,.15) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(245,158,11,.12) 0%, transparent 50%),
      radial-gradient(circle at 50% 50%, rgba(254,243,199,.8) 0%, transparent 70%);
    pointer-events:none; z-index:0;
  }

  #wrap {
    position:relative; z-index:1;
    display:flex; flex-direction:column; align-items:center; gap:16px;
    width:100%; max-width:480px;
  }

  /* animations */
  @keyframes blink    { 0%,100%{opacity:1} 50%{opacity:.25} }
  @keyframes fadein   { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
  @keyframes logslide { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
  @keyframes popCell  { 0%{transform:scale(1)} 45%{transform:scale(1.8)} 100%{transform:scale(1)} }
  @keyframes waddle   { 0%,100%{transform:rotate(-8deg)} 50%{transform:rotate(8deg)} }
  @keyframes bounce   { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
  @keyframes bubbleup { 0%{opacity:.7;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-40px) scale(.5)} }

  /* duck header */
  #duck-header { text-align:center; margin-bottom:4px; animation:fadein .4s ease both; }
  #duck-emoji {
    font-size:64px; line-height:1;
    display:inline-block;
    filter:drop-shadow(0 4px 8px rgba(245,158,11,.3));
  }
  #duck-emoji.running { animation:waddle .5s ease-in-out infinite; }
  #duck-emoji.done    { animation:bounce .6s ease-in-out infinite; }
  #app-subtitle {
    font-size:11px; font-weight:900;
    letter-spacing:.25em; text-transform:uppercase;
    color:var(--muted); margin-top:6px;
  }

  /* install banner */
  #install-bar {
    display:none; width:100%; max-width:480px;
    background:#fffbeb; border:2px solid var(--yellow);
    border-radius:16px; padding:10px 16px;
    align-items:center; justify-content:space-between; gap:8px;
  }
  #install-bar.show { display:flex; }
  #install-bar span { font-size:11px; color:var(--yellow-dkr); font-weight:700; }
  #btn-install {
    border:none; cursor:pointer;
    background:var(--yellow); color:var(--text);
    font-size:11px; font-weight:800;
    padding:7px 16px; border-radius:10px; white-space:nowrap;
    font-family:'Nunito',sans-serif;
  }
  #btn-install-close {
    border:none; background:none; cursor:pointer;
    font-size:18px; color:var(--muted); line-height:1; padding:0 4px;
  }

  /* card */
  .card {
    background:var(--card); border-radius:28px;
    box-shadow:
      0 4px 0 0 var(--muted-lt),
      0 8px 32px rgba(251,191,36,.18),
      0 0 0 2px var(--muted-lt);
    width:100%; animation:fadein .55s ease both;
  }

  /* timer card */
  #timer-card { padding:28px 28px 24px; display:flex; flex-direction:column; align-items:center; }
  #phase-label {
    font-size:12px; font-weight:800; letter-spacing:.22em; text-transform:uppercase;
    color:var(--yellow-dkr); margin-bottom:20px;
    display:flex; align-items:center; gap:7px; transition:color .4s;
    background:var(--yellow-lt); padding:5px 14px; border-radius:20px;
  }
  #phase-dot {
    width:7px; height:7px; border-radius:50%;
    background:var(--yellow-dkr); flex-shrink:0; transition:background .4s;
  }
  #phase-dot.running { animation:blink 1s ease-in-out infinite; }

  /* donut */
  #ring-wrap { position:relative; width:220px; height:220px; margin-bottom:20px; }
  #ring-svg { position:absolute; top:0; left:0; transform:rotate(-90deg); }
  #track { fill:none; stroke:var(--muted-lt); stroke-width:20; }
  #arc   { fill:none; stroke:var(--yellow); stroke-width:20; stroke-linecap:round;
           transition:stroke-dasharray .7s linear,stroke .4s;
           filter:drop-shadow(0 0 6px rgba(251,191,36,.5)); }
  #ring-inner {
    position:absolute; inset:20px; border-radius:50%;
    background:linear-gradient(135deg,#fffde7,#fffbeb); transition:box-shadow .4s;
  }
  #center {
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px;
  }
  #time-display {
    font-family:'Orbitron',monospace;
    font-size:44px; font-weight:900; letter-spacing:.02em;
    color:var(--text); line-height:1; transition:color .4s,font-size .3s;
    text-shadow:0 2px 8px rgba(245,158,11,.2);
  }
  #set-display { font-size:11px; color:var(--muted); letter-spacing:.12em; font-family:monospace; font-weight:700; }

  /* task chips */
  #task-row { display:flex; gap:6px; flex-wrap:wrap; justify-content:center; margin-bottom:16px; }
  .task-chip {
    font-size:11px; font-weight:700; padding:5px 12px; border-radius:20px;
    background:var(--yellow-lt); color:var(--yellow-dkr);
    border:2px solid transparent; cursor:pointer; transition:all .2s; white-space:nowrap;
  }
  .task-chip:active { transform:scale(.95); }
  .task-chip.active {
    background:var(--yellow); color:var(--text);
    border-color:var(--yellow-dk); box-shadow:0 2px 8px rgba(251,191,36,.4);
  }

  /* indicators */
  #indicators { display:flex; gap:8px; margin-bottom:18px; }
  .dot { height:9px; border-radius:5px; background:var(--pill); transition:all .3s ease; }

  /* controls */
  #controls { display:flex; gap:10px; align-items:center; }
  .pomo-btn {
    border:none; cursor:pointer;
    font-family:'Nunito',sans-serif; font-weight:800;
    letter-spacing:.04em; border-radius:14px;
    padding:0 18px; font-size:12px;
    background:var(--yellow-lt); color:var(--yellow-dkr);
    height:42px; display:flex; align-items:center; justify-content:center;
    transition:all .15s; text-transform:uppercase; border:2px solid var(--muted-lt);
  }
  .pomo-btn:active { transform:scale(.95); background:var(--muted-lt); }
  #btn-start {
    border-radius:16px; padding:0 40px;
    font-size:14px; font-weight:900;
    background:var(--yellow); color:var(--text);
    box-shadow:0 4px 0 var(--yellow-dkr),0 6px 20px rgba(251,191,36,.4);
    height:50px; border:none; transition:all .15s;
  }
  #btn-start:active { transform:translateY(3px); box-shadow:0 1px 0 var(--yellow-dkr),0 2px 8px rgba(251,191,36,.3); }
  #btn-start:disabled { background:var(--muted-lt); color:#b45309; box-shadow:0 4px 0 #fde68a; cursor:default; }

  #hint { margin-top:14px; font-size:10px; color:var(--muted); letter-spacing:.15em; text-transform:uppercase; min-height:13px; text-align:center; font-weight:700; }
  #cheer { font-size:13px; font-weight:800; color:var(--yellow-dkr); margin-top:8px; min-height:18px; text-align:center; }

  .sparkle { position:fixed; pointer-events:none; font-size:20px; z-index:999; animation:bubbleup 1.2s ease-out forwards; }

  /* graph */
  #graph-card { padding:22px 22px 18px; animation-delay:.1s; }
  #graph-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  #graph-title { font-size:11px; font-weight:900; letter-spacing:.3em; text-transform:uppercase; color:var(--muted); }
  #graph-stats { font-size:11px; font-weight:800; color:var(--yellow-dkr); }
  #month-labels { display:flex; margin-bottom:4px; padding-left:24px; font-size:9px; color:var(--muted); letter-spacing:.04em; overflow:hidden; }
  .month-label { flex-shrink:0; }
  #graph-body { display:flex; gap:4px; }
  #weekday-labels { display:flex; flex-direction:column; gap:2px; padding-top:2px; font-size:9px; color:var(--muted); }
  .wday { height:11px; line-height:11px; width:16px; text-align:right; padding-right:4px; font-weight:700; }
  #graph-grid { display:flex; gap:2px; overflow-x:auto; scrollbar-width:none; padding-bottom:2px; }
  #graph-grid::-webkit-scrollbar { display:none; }
  .week-col { display:flex; flex-direction:column; gap:2px; }
  .cell { width:11px; height:11px; border-radius:3px; background:var(--c0); cursor:default; transition:transform .15s; flex-shrink:0; }
  .cell:hover { transform:scale(1.4); }
  .cell.c1{background:var(--c1)} .cell.c2{background:var(--c2)} .cell.c3{background:var(--c3)} .cell.c4{background:var(--c4)}
  .cell.pop { animation:popCell .4s ease; }
  .cell.future { opacity:.3; }
  #legend { display:flex; align-items:center; gap:5px; margin-top:10px; justify-content:flex-end; font-size:9px; color:var(--muted); font-weight:700; }
  .leg { width:10px; height:10px; border-radius:3px; }

  #tooltip {
    position:fixed; pointer-events:none;
    background:#78350F; color:#fff; font-family:'Nunito',sans-serif; font-weight:700;
    font-size:11px; border-radius:10px; padding:5px 12px; white-space:nowrap;
    opacity:0; transition:opacity .15s; z-index:100; box-shadow:0 4px 12px rgba(0,0,0,.15);
  }
  #tooltip.show { opacity:1; }

  /* log */
  #log-card { padding:20px 22px; animation-delay:.2s; }
  #log-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
  #log-title { font-size:11px; font-weight:900; letter-spacing:.3em; text-transform:uppercase; color:var(--muted); }
  #btn-clear-log { border:none; background:none; cursor:pointer; font-family:'Nunito',sans-serif; font-size:10px; color:#D97706; padding:4px 10px; border-radius:8px; text-transform:uppercase; letter-spacing:.05em; height:28px; font-weight:700; }
  #btn-clear-log:active { background:var(--yellow-lt); }
  #log-list { display:flex; flex-direction:column; gap:6px; max-height:160px; overflow-y:auto; scrollbar-width:thin; scrollbar-color:var(--muted-lt) transparent; }
  #log-list::-webkit-scrollbar { width:3px; }
  #log-list::-webkit-scrollbar-thumb { background:var(--muted-lt); border-radius:3px; }
  .log-item { display:flex; align-items:center; justify-content:space-between; padding:8px 12px; background:var(--yellow-lt); border-radius:12px; border:1.5px solid var(--muted-lt); animation:logslide .3s ease; }
  .log-left { display:flex; align-items:center; gap:8px; }
  .log-icon { font-size:14px; }
  .log-date { font-size:11px; color:var(--text-lt); font-family:monospace; font-weight:700; }
  .log-time-s { font-size:10px; color:var(--muted); }
  .log-task-name { font-size:10px; color:var(--muted); font-weight:700; }
  .log-badge { display:inline-flex; align-items:center; gap:4px; background:var(--yellow); border-radius:8px; padding:3px 10px; font-size:11px; font-weight:900; color:var(--text); }
  #log-empty { font-size:11px; color:var(--muted); text-align:center; padding:12px 0; font-weight:700; }
</style>
</head>
<body>
<div id="tooltip"></div>
<div id="wrap">

  <div id="install-bar">
    <span>📲 ホーム画面に追加でオフライン使用可能</span>
    <button id="btn-install">追加</button>
    <button id="btn-install-close">×</button>
  </div>

  <!-- chick header -->
  <div id="duck-header">
    <div id="duck-emoji">🐥</div>
    <div id="app-subtitle">おそうじタイマー</div>
  </div>

  <div class="card" id="timer-card">
    <div id="phase-label">
      <span id="phase-dot"></span>
      <span id="phase-text">おそうじ中！</span>
    </div>
    <div id="ring-wrap">
      <div id="ring-inner"></div>
      <svg id="ring-svg" width="220" height="220">
        <circle id="track" cx="110" cy="110" r="92"/>
        <circle id="arc"   cx="110" cy="110" r="92"/>
      </svg>
      <div id="center">
        <div id="time-display">25:00</div>
        <div id="set-display">SET 1 / 4</div>
      </div>
    </div>
    <div id="task-row">
      <div class="task-chip active" data-task="🧹 掃除機">🧹 掃除機</div>
      <div class="task-chip" data-task="🫧 お風呂">🫧 お風呂</div>
      <div class="task-chip" data-task="🍽️ 食器">🍽️ 食器</div>
      <div class="task-chip" data-task="🧺 洗濯">🧺 洗濯</div>
      <div class="task-chip" data-task="✨ その他">✨ その他</div>
    </div>
    <div id="indicators">
      <div class="dot" id="dot-0"></div>
      <div class="dot" id="dot-1"></div>
      <div class="dot" id="dot-2"></div>
      <div class="dot" id="dot-3"></div>
    </div>
    <div id="controls">
      <button class="pomo-btn" id="btn-reset">リセット</button>
      <button class="pomo-btn" id="btn-start">スタート</button>
      <button class="pomo-btn" id="btn-skip">スキップ →</button>
    </div>
    <div id="hint">おそうじ → 休憩 → くりかえし</div>
    <div id="cheer">いってみよう！🐥</div>
  </div>

  <div class="card" id="graph-card">
    <div id="graph-header">
      <div id="graph-title">🌟 Activity</div>
      <div id="graph-stats"></div>
    </div>
    <div id="month-labels"></div>
    <div id="graph-body">
      <div id="weekday-labels">
        <div class="wday"></div>
        <div class="wday">Mon</div>
        <div class="wday"></div>
        <div class="wday">Wed</div>
        <div class="wday"></div>
        <div class="wday">Fri</div>
        <div class="wday"></div>
      </div>
      <div id="graph-grid"></div>
    </div>
    <div id="legend">
      <span>Less</span>
      <div class="leg" style="background:var(--c0)"></div>
      <div class="leg" style="background:var(--c1)"></div>
      <div class="leg" style="background:var(--c2)"></div>
      <div class="leg" style="background:var(--c3)"></div>
      <div class="leg" style="background:var(--c4)"></div>
      <span>More</span>
    </div>
  </div>

  <div class="card" id="log-card">
    <div id="log-header">
      <div id="log-title">🐥 きろく</div>
      <button id="btn-clear-log">クリア</button>
    </div>
    <div id="log-list">
      <div id="log-empty">まだ記録がありません 🐣</div>
    </div>
  </div>
</div>

<script>
(function(){
  /* PWA */
  if('serviceWorker' in navigator){
    var swCode=[
      'var CACHE="clean-pomo-v2";',
      'self.addEventListener("install",function(e){',
      '  e.waitUntil(caches.open(CACHE).then(function(c){return c.addAll([self.location.href]);}));',
      '  self.skipWaiting();',
      '});',
      'self.addEventListener("activate",function(e){',
      '  e.waitUntil(caches.keys().then(function(keys){',
      '    return Promise.all(keys.filter(function(k){return k!==CACHE;}).map(function(k){return caches.delete(k);}));',
      '  }).then(function(){return clients.claim();}));',
      '});',
      'self.addEventListener("fetch",function(e){',
      '  e.respondWith(caches.match(e.request).then(function(r){return r||fetch(e.request);}));',
      '});'
    ].join('\n');
    try{
      var blob=new Blob([swCode],{type:'application/javascript'});
      navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(function(){});
    }catch(e){}
  }
  var deferredPrompt=null;
  var installBar=document.getElementById('install-bar');
  window.addEventListener('beforeinstallprompt',function(e){e.preventDefault();deferredPrompt=e;installBar.classList.add('show');});
  document.getElementById('btn-install').addEventListener('click',function(){if(deferredPrompt){deferredPrompt.prompt();deferredPrompt=null;}installBar.classList.remove('show');});
  document.getElementById('btn-install-close').addEventListener('click',function(){installBar.classList.remove('show');});

  /* constants */
  var WORK=25*60, BREAK=5*60, MAX_SETS=4;
  var R=92, CIRC=2*Math.PI*R;
  var LOG_KEY="clean_pomo_log_v1";
  var STATE_KEY="clean_pomo_state_v2";
  var MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  var WEEKS=53;

  var CHEER_WORK=["ピカピカにしよう！✨","がんばれ〜！💪","スッキリさせよう！🧹","あともう少し！🌟","きれいになってきた！🫧","ファイト！🐥","泡立てていこう！🫧","終わったら気持ちいい！🌈"];
  var CHEER_BREAK=["よくやった！休憩中〜☕","ひと息つこう！🍵","えらい！🎉","上手！🐥","すごいじゃん！💛","ゆっくり休んでね〜🌸"];
  var CHEER_DONE=["🎊 全部おわった！最高！","🐥🐥🐥 ピヨピヨ！","✨ ピッカピカ！やったね！","🌟 完璧！おそうじマスター！","🎉 お疲れ様！すごい！"];

  /* state */
  var phase, timeLeft, isRunning, currentSet, completedSets, done;
  var startedAt=null, _timeLeftBase=WORK, tmr=null;
  var selectedTask="🧹 掃除機";

  /* elements */
  var arcEl    =document.getElementById("arc");
  var ringInner=document.getElementById("ring-inner");
  var timeEl   =document.getElementById("time-display");
  var setEl    =document.getElementById("set-display");
  var phaseText=document.getElementById("phase-text");
  var phaseDot =document.getElementById("phase-dot");
  var hintEl   =document.getElementById("hint");
  var cheerEl  =document.getElementById("cheer");
  var btnStart =document.getElementById("btn-start");
  var btnSkip  =document.getElementById("btn-skip");
  var btnReset =document.getElementById("btn-reset");
  var duckEl   =document.getElementById("duck-emoji");
  var tooltip  =document.getElementById("tooltip");

  function fmt(s){s=Math.max(0,Math.round(s));return ("0"+Math.floor(s/60)).slice(-2)+":"+("0"+(s%60)).slice(-2);}
  function toKey(d){return d.getFullYear()+"/"+ ("0"+(d.getMonth()+1)).slice(-2)+"/"+ ("0"+d.getDate()).slice(-2);}
  function rnd(arr){return arr[Math.floor(Math.random()*arr.length)];}

  function spawnSparkles(){
    var emojis=["✨","🌟","⭐","💛","🐥","🫧","🎉"];
    for(var i=0;i<8;i++){
      (function(i){setTimeout(function(){
        var el=document.createElement("div");el.className="sparkle";
        el.textContent=emojis[Math.floor(Math.random()*emojis.length)];
        el.style.left=Math.random()*80+10+"%";el.style.top=Math.random()*60+15+"%";
        document.body.appendChild(el);
        setTimeout(function(){el.parentNode&&el.parentNode.removeChild(el);},1400);
      },i*100);})(i);
    }
  }

  document.querySelectorAll(".task-chip").forEach(function(chip){
    chip.addEventListener("click",function(){
      document.querySelectorAll(".task-chip").forEach(function(c){c.classList.remove("active");});
      chip.classList.add("active"); selectedTask=chip.getAttribute("data-task");
    });
  });

  /* persistence */
  function saveState(){
    try{localStorage.setItem(STATE_KEY,JSON.stringify({
      phase:phase,timeLeft:timeLeft,isRunning:isRunning,
      currentSet:currentSet,completedSets:completedSets,done:done,
      startedAt:startedAt,timeLeftBase:_timeLeftBase,selectedTask:selectedTask
    }));}catch(e){}
  }
  function loadState(){
    try{
      var s=JSON.parse(localStorage.getItem(STATE_KEY));
      if(!s)return false;
      phase=s.phase||"work"; isRunning=s.isRunning||false;
      currentSet=s.currentSet||1; completedSets=s.completedSets||0;
      done=s.done||false; startedAt=s.startedAt||null; _timeLeftBase=s.timeLeftBase||WORK;
      if(s.selectedTask)selectedTask=s.selectedTask;
      if(isRunning&&startedAt){
        var elapsed=Math.floor((Date.now()-startedAt)/1000);
        timeLeft=(_timeLeftBase||s.timeLeft||WORK)-elapsed;
        if(timeLeft<=0){timeLeft=0;isRunning=false;return "expired";}
      }else{timeLeft=s.timeLeft!=null?s.timeLeft:WORK;}
      return true;
    }catch(e){return false;}
  }
  function resetState(){phase="work";timeLeft=WORK;isRunning=false;currentSet=1;completedSets=0;done=false;startedAt=null;_timeLeftBase=WORK;}

  /* log */
  function loadLog(){try{return JSON.parse(localStorage.getItem(LOG_KEY))||[];}catch(e){return[];}}
  function saveLog(l){try{localStorage.setItem(LOG_KEY,JSON.stringify(l));}catch(e){}}
  function addLogEntry(sets){
    var now=new Date(); var log=loadLog();
    log.unshift({date:toKey(now),time:("0"+now.getHours()).slice(-2)+":"+("0"+now.getMinutes()).slice(-2),sets:sets,task:selectedTask});
    saveLog(log); renderLog(); renderGraph(true);
  }
  function renderLog(){
    var log=loadLog(); var list=document.getElementById("log-list"); var empty=document.getElementById("log-empty");
    var items=list.querySelectorAll(".log-item"); for(var i=0;i<items.length;i++)items[i].parentNode.removeChild(items[i]);
    if(!log.length){empty.style.display="";return;} empty.style.display="none";
    log.forEach(function(e){
      var item=document.createElement("div"); item.className="log-item";
      item.innerHTML='<div class="log-left"><span class="log-icon">'+(e.task?e.task.split(" ")[0]:"✨")+'</span>'
        +'<div><div class="log-date">'+e.date+' <span class="log-time-s">'+e.time+'</span></div>'
        +(e.task?'<div class="log-task-name">'+e.task+'</div>':'')+'</div></div>'
        +'<span class="log-badge">'+e.sets+' set'+(e.sets>1?"s":"")+'</span>';
      list.appendChild(item);
    });
  }
  document.getElementById("btn-clear-log").addEventListener("click",function(){
    if(confirm("記録をすべて削除しますか？🐥")){try{localStorage.removeItem(LOG_KEY);}catch(e){}renderLog();renderGraph(false);}
  });

  /* graph */
  function buildDateMap(){var log=loadLog(),map={};log.forEach(function(e){map[e.date]=(map[e.date]||0)+e.sets;});return map;}
  function cellClass(n){if(!n)return"";if(n===1)return"c1";if(n===2)return"c2";if(n===3)return"c3";return"c4";}
  function renderGraph(animate){
    var grid=document.getElementById("graph-grid"); var monthLabels=document.getElementById("month-labels"); var statsEl=document.getElementById("graph-stats");
    grid.innerHTML=""; monthLabels.innerHTML="";
    var map=buildDateMap(); var today=new Date(); today.setHours(0,0,0,0); var todayKey=toKey(today);
    var start=new Date(today); start.setDate(start.getDate()-(WEEKS*7-1)-start.getDay());
    var totalSets=0,activeDays=0;
    Object.keys(map).forEach(function(k){var d=new Date(k.replace(/\//g,"-"));var diff=(today-d)/86400000;if(diff>=0&&diff<365){totalSets+=map[k];activeDays++;}});
    statsEl.textContent="🌟 "+totalSets+" sets · "+activeDays+" days";
    var monthLabelData=[],prevMonth=-1,unitW=13;
    for(var w=0;w<WEEKS;w++){
      var col=document.createElement("div"); col.className="week-col";
      for(var d2=0;d2<7;d2++){
        var date=new Date(start); date.setDate(start.getDate()+w*7+d2);
        var key=toKey(date); var sets=map[key]||0;
        var cell=document.createElement("div"); cell.className="cell";
        var cls=cellClass(sets); if(cls)cell.classList.add(cls);
        if(date>today)cell.classList.add("future");
        if(animate&&key===todayKey&&cls)cell.classList.add("pop");
        (function(k,s){
          cell.addEventListener("mouseenter",function(ev){tooltip.textContent=k+"  "+(s>0?"🌟 "+s+" set"+(s>1?"s":""):"おそうじなし");tooltip.classList.add("show");});
          cell.addEventListener("mousemove",function(ev){tooltip.style.left=(ev.clientX+12)+"px";tooltip.style.top=(ev.clientY-30)+"px";});
          cell.addEventListener("mouseleave",function(){tooltip.classList.remove("show");});
        })(key,sets);
        col.appendChild(cell);
        if(d2===0){var m=date.getMonth();if(m!==prevMonth){monthLabelData.push({col:w,label:MONTHS[m]});prevMonth=m;}}
      }
      grid.appendChild(col);
    }
    monthLabelData.forEach(function(ml,i){
      var span=document.createElement("span"); span.className="month-label";
      var nextCol=i<monthLabelData.length-1?monthLabelData[i+1].col:WEEKS;
      span.style.width=((nextCol-ml.col)*unitW||40)+"px";
      span.textContent=(i>0&&ml.col-monthLabelData[i-1].col<3)?"":ml.label;
      monthLabels.appendChild(span);
    });
    grid.scrollLeft=grid.scrollWidth;
  }

  /* render */
  function render(){
    var total=(phase==="work")?WORK:BREAK; var progress=timeLeft/total;
    arcEl.style.strokeDasharray=(CIRC*(1-progress))+" "+(CIRC*progress+1);
    arcEl.style.strokeDashoffset=CIRC;
    var isWork=(phase==="work");
    var color=isWork?"#FBBF24":"#FB923C";
    var glow=isWork?"rgba(251,191,36,.35)":"rgba(251,146,60,.35)";
    arcEl.style.stroke=color; arcEl.style.filter="drop-shadow(0 0 8px "+glow+")";
    phaseDot.style.background=isWork?"#D97706":"#EA580C";
    isRunning?phaseDot.classList.add("running"):phaseDot.classList.remove("running");
    ringInner.style.boxShadow=isRunning?"inset 0 0 40px "+glow:"none";
    duckEl.classList.remove("running","done");
    if(done)duckEl.classList.add("done");
    else if(isRunning)duckEl.classList.add("running");

    if(done){
      phaseText.textContent="おそうじ完了！";
      timeEl.textContent="✨"; timeEl.style.fontSize="56px"; timeEl.style.color="#F59E0B";
      setEl.style.display="none"; hintEl.textContent=""; cheerEl.textContent=rnd(CHEER_DONE);
      btnStart.textContent="完了！"; btnStart.disabled=true; btnSkip.disabled=true;
    }else if(isWork){
      phaseText.textContent=isRunning?"おそうじ中！":"おそうじ";
      timeEl.textContent=fmt(timeLeft); timeEl.style.fontSize="44px"; timeEl.style.color="#78350F";
      setEl.style.display=""; setEl.textContent="SET "+currentSet+" / "+MAX_SETS;
      btnStart.textContent=isRunning?"一時停止":"スタート"; btnStart.disabled=false; btnSkip.disabled=false;
      btnStart.style.background=isRunning?"#F59E0B":"#FBBF24";
      hintEl.textContent="おそうじ → 休憩 → くりかえし";
      if(!isRunning&&timeLeft===WORK)cheerEl.textContent=rnd(CHEER_WORK);
    }else{
      phaseText.textContent="休憩中〜 ☕";
      timeEl.textContent=fmt(timeLeft); timeEl.style.fontSize="44px"; timeEl.style.color="#78350F";
      setEl.style.display=""; setEl.textContent="SET "+currentSet+" / "+MAX_SETS;
      btnStart.textContent=isRunning?"一時停止":"スタート"; btnStart.disabled=false; btnSkip.disabled=false;
      btnStart.style.background="#FB923C";
      hintEl.textContent="次のセット: SET "+(currentSet+1);
      if(!isRunning)cheerEl.textContent=rnd(CHEER_BREAK);
    }
    for(var i=0;i<MAX_SETS;i++){
      var dot=document.getElementById("dot-"+i); var isCur=(i===currentSet-1)&&!done;
      dot.style.width=isCur?"26px":"9px";
      dot.style.background=(i<completedSets)?"#FBBF24":isCur?color:"#FEF3C7";
      dot.style.boxShadow=isCur?"0 0 8px "+glow:"none";
    }
    saveState();
  }

  function advance(){
    clearInterval(tmr); isRunning=false; startedAt=null;
    if(phase==="work"){
      if(currentSet>=MAX_SETS){done=true;spawnSparkles();addLogEntry(completedSets+1);render();return;}
      phase="break"; timeLeft=BREAK;
    }else{completedSets++;currentSet++;phase="work";timeLeft=WORK;}
    cheerEl.textContent=phase==="work"?rnd(CHEER_WORK):rnd(CHEER_BREAK);
    render();
  }

  function startTick(){
    clearInterval(tmr);
    tmr=setInterval(function(){
      if(!startedAt)return;
      var tl=_timeLeftBase-Math.floor((Date.now()-startedAt)/1000);
      if(tl<=0){clearInterval(tmr);timeLeft=0;render();advance();return;}
      timeLeft=tl; render();
    },500);
  }

  btnStart.addEventListener("click",function(){
    if(done)return; isRunning=!isRunning;
    if(isRunning){startedAt=Date.now();_timeLeftBase=timeLeft;startTick();cheerEl.textContent=phase==="work"?rnd(CHEER_WORK):rnd(CHEER_BREAK);}
    else{clearInterval(tmr);timeLeft=Math.max(0,_timeLeftBase-Math.floor((Date.now()-startedAt)/1000));startedAt=null;}
    render();
  });
  btnReset.addEventListener("click",function(){
    if(completedSets>0&&!done)addLogEntry(completedSets);
    clearInterval(tmr); resetState(); cheerEl.textContent="いってみよう！🐥"; render();
  });
  btnSkip.addEventListener("click",function(){
    if(done)return; clearInterval(tmr); startedAt=null; isRunning=false; advance();
  });

  document.addEventListener("visibilitychange",function(){
    if(document.visibilityState==="visible"&&isRunning&&startedAt){
      var tl=Math.max(0,_timeLeftBase-Math.floor((Date.now()-startedAt)/1000));
      if(tl<=0){clearInterval(tmr);timeLeft=0;render();advance();return;}
      timeLeft=tl; startTick(); render();
    }
  });
  window.addEventListener("focus",function(){
    if(isRunning&&startedAt){
      var tl=Math.max(0,_timeLeftBase-Math.floor((Date.now()-startedAt)/1000));
      if(tl<=0){clearInterval(tmr);timeLeft=0;render();advance();return;}
      timeLeft=tl; startTick(); render();
    }
  });

  /* init */
  arcEl.style.strokeDasharray="0 "+(CIRC+1);
  arcEl.style.strokeDashoffset=CIRC;
  var loaded=loadState();
  if(!loaded)resetState();
  document.querySelectorAll(".task-chip").forEach(function(chip){
    chip.classList.remove("active");
    if(chip.getAttribute("data-task")===selectedTask)chip.classList.add("active");
  });
  if(isRunning&&startedAt){_timeLeftBase=timeLeft;startedAt=Date.now();startTick();}
  if(loaded==="expired")advance();else render();
  renderLog(); renderGraph(false);
})();
</script>
</body>
</html>
